version: '3.8'

services:
  dba-sentinel-api:
    build: .
    container_name: dba-sentinel-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      # Montado para persistir la DB SQLite generada localmente
      - ./data:/app/data

  dba-sentinel-dashboard:
    build: .
    container_name: dba-sentinel-dashboard
    # Sobreescribir el comando para ejecutar streamlit en lugar de FastAPI
    command: ["streamlit", "run", "dashboard/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://dba-sentinel-api:8000
      - API_KEY=supersecret_dba_key
    depends_on:
      - dba-sentinel-api
    restart: unless-stopped

  dba-postgres:
    image: postgres:15-alpine
    container_name: dba-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dba-mysql:
    image: mysql:8
    container_name: dba-mysql
    environment:
      MYSQL_ROOT_PASSWORD: tu_password
      MYSQL_DATABASE: mysql
    ports:
      - "3307:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  postgres_data:
  mysql_data:
